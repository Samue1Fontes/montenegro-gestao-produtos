services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mgp-backend
    ports:
      - "3333:3333"
    volumes:
      - ./backend/src/data:/app/dist/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mgp-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3333/products
    depends_on:
      - backend
    restart: unless-stopped